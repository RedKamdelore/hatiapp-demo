{% extends "base.html" %}
{% block title %}Редактировать пользователя{% endblock %}

{% block content %}
<div class="mb-6 flex items-center gap-3">
  <a href="/admin" class="text-gray-400 hover:text-gray-600 transition">← Назад</a>
  <div>
    <h1 class="text-2xl font-bold text-gray-800">Редактировать пользователя</h1>
    <p class="text-gray-400 text-sm mt-1">{{ u.username }}</p>
  </div>
</div>

<div class="bg-white rounded-xl border border-gray-200 p-6 max-w-lg">

  {% if success %}
  <div class="bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3 text-sm mb-5">
    ✅ Данные сохранены
  </div>
  {% endif %}

  {% if error %}
  <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm mb-5">
    ❌ {{ error }}
  </div>
  {% endif %}

  <form method="post" class="flex flex-col gap-4">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Логин</label>
      <input type="text" name="username" value="{{ u.username }}" required
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Отображаемое имя</label>
      <input type="text" name="full_name" value="{{ u.full_name or '' }}"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
        placeholder="Иванов Иван"/>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Роль</label>
      <select name="role"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
        <option value="volunteer"  {% if u.role == 'volunteer'  %}selected{% endif %}>Волонтёр</option>
        <option value="leader"     {% if u.role == 'leader'     %}selected{% endif %}>Руководитель</option>
        <option value="lotos"      {% if u.role == 'lotos'      %}selected{% endif %}>Лотос</option>
        <option value="permanent"  {% if u.role == 'permanent'  %}selected{% endif %}>Бессменный</option>
        <option value="admin"      {% if u.role == 'admin'      %}selected{% endif %}>Администратор</option>
      </select>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Дата заезда
          <span class="text-gray-400 font-normal">(в этот день нет на смене)</span>
        </label>
        <input type="date" name="arrival_date" value="{{ u.arrival_date.isoformat() if u.arrival_date else '' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Дата отъезда
          <span class="text-gray-400 font-normal">(в этот день нет на смене)</span>
        </label>
        <input type="date" name="departure_date" value="{{ u.departure_date.isoformat() if u.departure_date else '' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Новый пароль
        <span class="text-gray-400 font-normal">(оставьте пустым чтобы не менять)</span>
      </label>
      <input type="password" name="password"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
        placeholder="Введите новый пароль"/>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit"
        class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-5 py-2 rounded-lg text-sm transition">
        Сохранить
      </button>
      <a href="/admin"
        class="px-5 py-2 rounded-lg text-sm border border-gray-200 text-gray-600 hover:bg-gray-50 transition">
        Отмена
      </a>
    </div>

  </form>
</div>
{% endblock %}
